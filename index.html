<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTB Writeups — Senchuan</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0e12;
            --surface: #13161c;
            --surface-raised: #1a1e26;
            --border: #262b36;
            --text: #c8cdd6;
            --text-muted: #6b7280;
            --heading: #e8ecf2;
            --accent: #4ade80;
            --accent-dim: #166534;
            --easy: #4ade80;
            --medium: #fbbf24;
            --hard: #f87171;
            --insane: #c084fc;
            --linux: #60a5fa;
            --windows: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            border-bottom: 1px solid var(--border);
            padding: 3rem 2rem 2.5rem;
            position: relative;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--easy), var(--medium), var(--hard), var(--insane));
        }
        .header-inner {
            max-width: 960px;
            margin: 0 auto;
        }
        .header-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.6rem;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--heading);
            letter-spacing: -0.03em;
        }
        .header-stats {
            margin-top: 0.8rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .header-stats strong { color: var(--text); }

        .toolbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .toolbar-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.5rem 0.8rem;
            color: var(--heading);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-muted); }

        .filter-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.45rem 0.9rem;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .filter-btn.active-easy { border-color: var(--easy); color: var(--easy); background: #16653420; }
        .filter-btn.active-medium { border-color: var(--medium); color: var(--medium); background: #92400e20; }
        .filter-btn.active-hard { border-color: var(--hard); color: var(--hard); background: #991b1b20; }
        .filter-btn.active-insane { border-color: var(--insane); color: var(--insane); background: #6b21a820; }

        .content {
            max-width: 960px;
            margin: 0 auto;
            padding: 1.5rem 2rem 4rem;
        }

        .results-info {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .machine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.8rem;
        }

        .machine-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.1rem 1.3rem;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.15s;
            display: block;
            position: relative;
            overflow: hidden;
        }
        .machine-card:hover {
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }
        .machine-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px;
            height: 100%;
        }
        .machine-card.diff-easy::before { background: var(--easy); }
        .machine-card.diff-medium::before { background: var(--medium); }
        .machine-card.diff-hard::before { background: var(--hard); }
        .machine-card.diff-insane::before { background: var(--insane); }

        .card-top {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.6rem;
        }
        .card-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            object-fit: cover;
        }
        .card-badge-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface-raised);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .card-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--heading);
        }

        .card-meta {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .card-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            background: var(--surface-raised);
            color: var(--text-muted);
        }
        .card-tag.os-linux { color: var(--linux); }
        .card-tag.os-windows { color: var(--windows); }
        .card-tag.diff-easy { color: var(--easy); }
        .card-tag.diff-medium { color: var(--medium); }
        .card-tag.diff-hard { color: var(--hard); }
        .card-tag.diff-insane { color: var(--insane); }

        .card-techniques {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
        }
        .empty-state .icon { font-size: 2rem; margin-bottom: 1rem; }

        .footer {
            text-align: center;
            padding: 2rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }

        @media (max-width: 640px) {
            .header h1 { font-size: 1.6rem; }
            .machine-grid { grid-template-columns: 1fr; }
            .content { padding: 1rem 1rem 3rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="header-label">Senchuan's Security Lab</div>
        <h1>HTB Writeups</h1>
        <div class="header-stats">
            <span><strong id="total-count">0</strong> machines</span>
            <span><strong id="linux-count">0</strong> Linux</span>
            <span><strong id="windows-count">0</strong> Windows</span>
        </div>
    </div>
</header>

<div class="toolbar">
    <div class="toolbar-inner">
        <input class="search-box" type="text" id="search" placeholder="Search machine, technique, tag...">
        <button class="filter-btn" data-filter="all" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" data-filter="easy" onclick="setFilter('easy', this)">Easy</button>
        <button class="filter-btn" data-filter="medium" onclick="setFilter('medium', this)">Medium</button>
        <button class="filter-btn" data-filter="hard" onclick="setFilter('hard', this)">Hard</button>
        <button class="filter-btn" data-filter="insane" onclick="setFilter('insane', this)">Insane</button>
        <button class="filter-btn" data-filter="linux" onclick="setFilter('linux', this)">Linux</button>
        <button class="filter-btn" data-filter="windows" onclick="setFilter('windows', this)">Windows</button>
    </div>
</div>

<main class="content">
    <div class="results-info" id="results-info"></div>
    <div class="machine-grid" id="grid"></div>
    <div class="empty-state" id="empty" style="display:none;">
        <div class="icon">🔍</div>
        <div>No machines match your search.</div>
    </div>
</main>

<footer class="footer">
    Senchuan · HTB Writeups · 2026
</footer>

<script>
/*
 * ═══════════════════════════════════════════════
 *  MACHINE REGISTRY — add new writeups here
 * ═══════════════════════════════════════════════
 *
 *  {
 *      name:       "Machine Name",
 *      difficulty: "easy" | "medium" | "hard" | "insane",
 *      os:         "linux" | "windows",
 *      badge:      "machinename/badge.png"  (optional),
 *      tags:       ["technique1", "technique2", ...],
 *      path:       "machinename/"
 *  }
 */
const machines = [
    {
        name: "Paperwork",
        difficulty: "easy",
        os: "linux",
        badge: "paperwork/paperwork-badge.png",
        tags: ["LPD injection", "PJL path traversal", "SCM_RIGHTS fd leak", "chisel tunneling"],
        path: "paperwork/"
    },
    {
        name: "Trick",
        difficulty: "easy",
        os: "linux",
        badge: "trick/trick-badge.png",
        tags: ["DNS zone transfer", "SQLi file read", "LFI filter bypass", "fail2ban config hijack"],
        path: "trick/"
    },
    {
        name: "Alert",
        difficulty: "easy",
        os: "linux",
        badge: "alert/alert-badge.png",
        tags: ["XSS via markdown", "LFI exfiltration", "htpasswd crack", "cron PHP injection"],
        path: "alert/"
    },
    {
        name: "Backdoor",
        difficulty: "easy",
        os: "linux",
        badge: "backdoor/backdoor-badge.png",
        tags: ["WordPress plugin LFI", "/proc enumeration", "gdbserver RCE", "screen SUID hijack"],
        path: "backdoor/"
    },
    {
        name: "Sightless",
        difficulty: "easy",
        os: "linux",
        badge: "sightless/sightless-badge.png",
        tags: ["SQLPad SSTI", "Docker shadow leak", "Froxlor blind XSS", "KeePass cracking", "SSH key recovery"],
        path: "sightless/"
    },
    {
        name: "Dog",
        difficulty: "easy",
        os: "linux",
        badge: "dog/dog-badge.png",
        tags: [".git exposure", "Backdrop CMS", "malicious module upload", "password reuse", "sudo bee eval"],
        path: "dog/"
    },
    {
        name: "PC",
        difficulty: "easy",
        os: "linux",
        tags: ["gRPC enumeration", "SQLite injection", "pyLoad CVE-2023-0297"],
        path: "pc/"
    },
    {
        name: "Helix",
        difficulty: "hard",
        os: "linux",
        tags: ["NiFi H2 RCE", "CVE-2023-34468", "OPC-UA manipulation", "ICS/OT"],
        path: "helix/"
    },
    {
        name: "Horizontall",
        difficulty: "easy",
        os: "linux",
        tags: ["Strapi RCE", "password reuse", "chisel tunneling", "Laravel CVE-2021-3129"],
        path: "horizontall/"
    },
    // ──────────────────────────────────────────
    // Add new machines below. Copy the block above,
    // change the fields, and the page updates itself.
    // ──────────────────────────────────────────
];

// ─── Render ───
let activeFilter = 'all';

function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = 'filter-btn';
    });
    if (f === 'all') {
        btn.classList.add('active');
    } else if (['easy','medium','hard','insane'].includes(f)) {
        btn.classList.add('active-' + f);
    } else {
        btn.classList.add('active');
    }
    render();
}

function render() {
    const query = document.getElementById('search').value.toLowerCase();
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const info = document.getElementById('results-info');

    let filtered = machines.filter(m => {
        const matchFilter =
            activeFilter === 'all' ||
            m.difficulty === activeFilter ||
            m.os === activeFilter;

        const searchStr = [m.name, m.os, m.difficulty, ...m.tags].join(' ').toLowerCase();
        const matchSearch = !query || searchStr.includes(query);

        return matchFilter && matchSearch;
    });

    if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        info.textContent = '0 results';
        return;
    }

    empty.style.display = 'none';
    info.textContent = filtered.length + ' machine' + (filtered.length > 1 ? 's' : '');

    grid.innerHTML = filtered.map(m => {
        const badgeHtml = m.badge
            ? `<img class="card-badge" src="${m.badge}" alt="${m.name}">`
            : `<div class="card-badge-placeholder">${m.name[0]}</div>`;

        return `
        <a class="machine-card diff-${m.difficulty}" href="${m.path}">
            <div class="card-top">
                ${badgeHtml}
                <span class="card-title">${m.name}</span>
            </div>
            <div class="card-meta">
                <span class="card-tag diff-${m.difficulty}">${m.difficulty}</span>
                <span class="card-tag os-${m.os}">${m.os}</span>
            </div>
            <div class="card-techniques">${m.tags.join(' · ')}</div>
        </a>`;
    }).join('');
}

// ─── Stats ───
document.getElementById('total-count').textContent = machines.length;
document.getElementById('linux-count').textContent = machines.filter(m => m.os === 'linux').length;
document.getElementById('windows-count').textContent = machines.filter(m => m.os === 'windows').length;

// ─── Events ───
document.getElementById('search').addEventListener('input', render);
document.querySelector('[data-filter="all"]').classList.add('active');
render();
</script>

</body>
</html>
